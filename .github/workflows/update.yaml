name: update

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.build.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - run: npm install
      - id: build
        run: node build.ts --commit
      - if: ${{ steps.build.outputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add .
          git commit --message ${{ steps.build.outputs.version }}
          git tag --no-sign ${{ steps.build.outputs.version }}
          git push origin HEAD --tags
          vsce package
      - if: ${{ steps.build.outputs.version }}
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: '*.vsix'

  ovsx:
    needs: update
    if: ${{ needs.update.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - run: npm install
      - uses: actions/download-artifact@v8
        with:
          name: vsix
      - run: npx ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  vsce:
    needs: update
    if: ${{ needs.update.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - run: npm install
      - uses: actions/download-artifact@v8
        with:
          name: vsix
      - run: npx vsce publish *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
